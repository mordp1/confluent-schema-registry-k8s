# =============================================================================
# Kubernetes Secret — Schema Registry HTTP Basic Auth credentials
# Namespace: kafka
#
# This Secret is mounted into the Schema Registry pod at:
#   /etc/schema-registry/auth/
#
# It provides two files:
#   1. jaas.conf          — JAAS configuration for the Jetty security realm
#   2. password.properties — username:password,role entries for the LoginModule
#
# JAAS realm name ("SchemaRegistry-Props") MUST match:
#   SCHEMA_REGISTRY_AUTHENTICATION_REALM in values.yaml (exact case match).
#
# Password file format (Jetty PropertyFileLoginModule):
#   <username>: <plaintext-password>,<role1>[,<role2>...]
#
# Roles MUST be a subset of SCHEMA_REGISTRY_AUTHENTICATION_ROLES in values.yaml.
#
# ⚠️  SECURITY NOTES:
#   • Passwords are stored as PLAINTEXT in this file. This is a Jetty limitation
#     for PropertyFileLoginModule; the file must be 0400 / owner-read-only
#     (enforced by defaultMode: 0400 in values.yaml volumes section).
#   • NEVER commit real passwords to git. Use sealed-secrets, external-secrets
#     operator, or Vault agent injector in production.
#   • For production, rotate credentials and store them in a secrets manager
#     (AWS Secrets Manager, Azure Key Vault, HashiCorp Vault).
#   • Generate secure passwords with: openssl rand -base64 32
#
# CP 8.x / Jetty 12 class note:
#   Confluent CP ≤ 7.x (Jetty 9): org.eclipse.jetty.jaas.spi.PropertyFileLoginModule
#   Confluent CP ≥ 8.x (Jetty 12): org.eclipse.jetty.security.jaas.spi.PropertyFileLoginModule
#   The package changed; using the old class in CP 8.x causes silent 401 on all requests.
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: schema-registry-auth
  namespace: kafka
  labels:
    app.kubernetes.io/name: cp-schema-registry
    app.kubernetes.io/component: auth
type: Opaque
stringData:
  # ---------------------------------------------------------------------------
  # JAAS configuration
  # The realm block name ("SchemaRegistry-Props") is case-sensitive and must
  # exactly match the SCHEMA_REGISTRY_AUTHENTICATION_REALM env var.
  #
  # PropertyFileLoginModule reads the 'file' path at authentication time
  # (not at startup), so changes to password.properties take effect without
  # a pod restart — BUT only if the Secret is mounted as a projected volume
  # with periodic refresh (default kubelet sync period: 60s).
  # ---------------------------------------------------------------------------
  jaas.conf: |
    SchemaRegistry-Props {
      org.eclipse.jetty.security.jaas.spi.PropertyFileLoginModule required
      file="/etc/schema-registry/auth/password.properties";
    };

  # ---------------------------------------------------------------------------
  # Password file
  # Format:  <username>: <plaintext-password>,<role1>[,<role2>...]
  #
  # Defined roles and their intended access:
  #   admin    — full access: create subjects, change compatibility, delete
  #   write    — can register schemas (POST /subjects/*/versions)
  #   read     — can read schemas (GET only operations)
  #
  # Add/remove users here; the file is re-read by the LoginModule on each
  # authentication attempt so no restart is required after Secret rotation
  # (subject to kubelet's secret sync interval, ~60 seconds by default).
  # ---------------------------------------------------------------------------
  password.properties: |
    # CHANGE THESE before deploying to any shared or production environment.
    # admin: full access (write + read + admin roles)
    admin:changeme-admin-password,admin,write,read
    # readonly: read-only service account for consumers, CI schema validation
    readonly:changeme-readonly-password,read
