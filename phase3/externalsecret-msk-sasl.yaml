# =============================================================================
# External Secrets Operator — sync MSK SCRAM credentials from AWS Secrets Manager
#
# Prerequisites:
#   - External Secrets Operator installed  (external-secrets.io)
#   - A ClusterSecretStore (or SecretStore) configured with AWS credentials
#     that have secretsmanager:GetSecretValue on the AmazonMSK_* path
#   - The MSK user secret already created in Secrets Manager:
#       Name: AmazonMSK_schema-registry
#       Value: {"username":"schema-registry","password":"<strong-password>"}
#
# What this does:
#   1. ESO reads username + password from Secrets Manager
#   2. Assembles them into the JAAS config string using a template
#   3. Creates / keeps-in-sync the Kubernetes Secret "schema-registry-msk-sasl"
#
# Result is the same Secret that secret-msk-sasl.yaml would create manually,
# but credentials are never stored in Git or in Helm values — they live only in
# AWS Secrets Manager and are rotated there.
#
# Install ESO:
#   helm repo add external-secrets https://charts.external-secrets.io
#   helm upgrade --install external-secrets external-secrets/external-secrets \
#     --namespace external-secrets --create-namespace
#
# Apply:
#   kubectl apply -f phase3/externalsecret-msk-sasl.yaml -n kafka
# =============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: schema-registry-msk-sasl
  namespace: kafka
  labels:
    app.kubernetes.io/name: cp-schema-registry
    app.kubernetes.io/component: msk-auth
spec:
  # How often ESO re-syncs from Secrets Manager.
  # Reduce to "1m" during initial setup; increase to "1h" once stable.
  refreshInterval: 1h

  secretStoreRef:
    # Name of your ClusterSecretStore (or SecretStore) for AWS.
    # A ClusterSecretStore example using IRSA (IAM Roles for Service Accounts):
    #
    #   apiVersion: external-secrets.io/v1beta1
    #   kind: ClusterSecretStore
    #   metadata:
    #     name: aws-secrets-manager
    #   spec:
    #     provider:
    #       aws:
    #         service: SecretsManager
    #         region: us-east-1
    #         auth:
    #           jwt:
    #             serviceAccountRef:
    #               name: external-secrets-sa
    #               namespace: external-secrets
    name: aws-secrets-manager
    kind: ClusterSecretStore

  target:
    name: schema-registry-msk-sasl   # name of the K8s Secret to create/update
    creationPolicy: Owner             # ESO owns and manages the Secret lifecycle
    template:
      type: Opaque
      # Assemble the JAAS config string from the individual fields.
      # ESO template syntax: {{ .variableName }} references secretKey values below.
      data:
        sasl-jaas-config: |
          org.apache.kafka.common.security.scram.ScramLoginModule required
          username="{{ .username }}"
          password="{{ .password }}";

  # Fetch individual fields from the JSON secret in Secrets Manager.
  # Secrets Manager secret format: {"username":"...","password":"..."}
  data:
    - secretKey: username
      remoteRef:
        key: AmazonMSK_schema-registry   # secret name in Secrets Manager
        property: username                # JSON field name

    - secretKey: password
      remoteRef:
        key: AmazonMSK_schema-registry
        property: password
