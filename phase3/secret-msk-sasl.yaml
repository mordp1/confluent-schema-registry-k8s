# =============================================================================
# Kubernetes Secret — MSK SASL/SCRAM-SHA-512 credentials
# Namespace: kafka
#
# This Secret is consumed by phase3/values-eks-msk-sasl.yaml via:
#   customEnv:
#     - name: SCHEMA_REGISTRY_KAFKASTORE_SASL_JAAS_CONFIG
#       valueFrom:
#         secretKeyRef:
#           name: schema-registry-msk-sasl
#           key: sasl-jaas-config
#
# WHY a Secret and not configurationOverrides?
#   The JAAS config string contains double-quotes. Helm renders configurationOverrides
#   values through {{ $value | quote }}, which would escape the inner quotes and break
#   the JAAS parser. Using valueFrom: secretKeyRef bypasses Helm templating entirely
#   and delivers the raw string directly as an environment variable.
#
# MSK SCRAM credential setup (one-time, outside Kubernetes):
#   1. Create the user secret in AWS Secrets Manager:
#        aws secretsmanager create-secret \
#          --name AmazonMSK_schema-registry \
#          --secret-string '{"username":"schema-registry","password":"<strong-password>"}'
#      Note: the name MUST start with "AmazonMSK_"
#
#   2. Associate the secret with your MSK cluster:
#        aws kafka batch-associate-scram-secret \
#          --cluster-arn arn:aws:kafka:REGION:ACCOUNT:cluster/CLUSTER-NAME/... \
#          --secret-arn-list arn:aws:secretsmanager:REGION:ACCOUNT:secret:AmazonMSK_schema-registry-...
#
#   3. The MSK broker will create the SCRAM user automatically. Allow ~5 minutes.
#
# PRODUCTION RECOMMENDATION:
#   Do NOT commit this file with real credentials.
#   Use the External Secrets Operator to sync directly from AWS Secrets Manager.
#   See phase3/externalsecret-msk-sasl.yaml for the ESO approach.
#
# Generate a strong password:
#   openssl rand -base64 32
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: schema-registry-msk-sasl
  namespace: kafka
  labels:
    app.kubernetes.io/name: cp-schema-registry
    app.kubernetes.io/component: msk-auth
type: Opaque
stringData:
  # The full JAAS config string for Kafka's SCRAM-SHA-512 login module.
  # Replace the username and password with your MSK SCRAM credentials.
  # The trailing semicolon is required by the JAAS parser.
  sasl-jaas-config: >-
    org.apache.kafka.common.security.scram.ScramLoginModule required
    username="schema-registry"
    password="changeme-msk-password";
